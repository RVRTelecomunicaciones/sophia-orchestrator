apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sophia-orchestator.fullname" . }}-secrets
  labels:
    {{- include "sophia-orchestator.labels" . | nindent 4 }}
type: Opaque
stringData:
  SOPHIA_DB_URL:                {{ required ".Values.secrets.dbUrl is required" .Values.secrets.dbUrl | quote }}
  SOPHIA_GOVERNANCE_URL:        {{ required ".Values.secrets.governanceUrl is required" .Values.secrets.governanceUrl | quote }}
  SOPHIA_GOVERNANCE_API_KEY:    {{ .Values.secrets.governanceApiKey | quote }}
  SOPHIA_MEMORY_URL:            {{ required ".Values.secrets.memoryUrl is required" .Values.secrets.memoryUrl | quote }}
  SOPHIA_MEMORY_API_KEY:        {{ .Values.secrets.memoryApiKey | quote }}
  SOPHIA_RUNTIME_URL:           {{ required ".Values.secrets.runtimeUrl is required" .Values.secrets.runtimeUrl | quote }}
  SOPHIA_RUNTIME_API_KEY:       {{ .Values.secrets.runtimeApiKey | quote }}
  SOPHIA_HTTP_API_KEY:          {{ .Values.secrets.httpApiKey | quote }}
  SOPHIA_HTTP_API_KEY_PROJECT:  {{ .Values.secrets.httpApiKeyProject | quote }}
