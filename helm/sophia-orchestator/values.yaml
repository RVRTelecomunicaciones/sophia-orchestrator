# Default values for sophia-orchestator.
# Override via `helm install -f my-values.yaml` or `--set key=value`.

image:
  repository: ghcr.io/rvrtelecomunicaciones/sophia-orchestator
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1   # V1 is single-instance; V3 adds leader election

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Required configuration. Provide via Secret resource or values override.
config:
  env: prod
  logLevel: info
  httpAddr: ":8080"
  spawn:
    max: 4

# Connection strings — CHANGE THESE for your environment.
# In production, prefer pulling these from a Secret manager (External
# Secrets Operator, AWS Secrets Manager, etc.) rather than committing.
secrets:
  dbUrl: ""             # postgres://user:pass@host:5432/db?sslmode=require
  governanceUrl: ""     # https://governance.example.com
  governanceApiKey: ""
  memoryUrl: ""         # https://memory.example.com
  memoryApiKey: ""
  runtimeUrl: ""        # https://runtime.example.com
  runtimeApiKey: ""
  httpApiKey: ""        # bootstrap API key for clients
  httpApiKeyProject: "default"

migrateOnBoot: true

probes:
  liveness:
    path: /api/v1/health
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /api/v1/ready
    initialDelaySeconds: 5
    periodSeconds: 5

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""
