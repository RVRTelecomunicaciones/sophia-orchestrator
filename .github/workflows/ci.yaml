name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # install-mode: goinstall builds golangci-lint with the repo's
          # pinned Go (1.26.2 via actions/setup-go above). The default
          # `binary` mode downloads a release built with an older Go
          # (currently go1.24) which then refuses to lint our go1.26-
          # targeted module:
          #   "the Go language version (go1.24) used to build golangci-lint
          #    is lower than the targeted Go version (1.26)"
          # Runtime-adapters uses goinstall for the same reason. ~30s
          # extra per CI run versus the binary download — well worth it
          # to stop forcing admin merges on every orch PR.
          install-mode: goinstall
          args: --timeout=5m

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: go test
        run: go test ./internal/... -race -count=1 -coverprofile=coverage.out
      - name: Coverage report
        run: go tool cover -func=coverage.out | tee coverage.txt | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: Run integration tests
        run: go test -tags=integration ./test/integration/... -count=1 -timeout=10m

  build:
    name: Build binary
    runs-on: ubuntu-latest
    # NB: 'lint' intentionally NOT in needs[] — the lint job has a
    # pre-existing failure (golangci-lint v1↔v2 schema mismatch on the
    # action) tracked as post-v0.2.0 follow-up in the soak matrix. Until
    # that's resolved, we still need Build/Docker artifacts to fire on
    # green unit tests, otherwise the orch's release pipeline is dark.
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: go build
        run: |
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.commit=${GITHUB_SHA::7}" \
            -o bin/sophia-orchestator ./cmd/sophia-orchestator
      - uses: actions/upload-artifact@v4
        with:
          name: sophia-orchestator-${{ github.sha }}
          path: bin/sophia-orchestator

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    # NB: 'lint' intentionally NOT in needs[] — the lint job has a
    # pre-existing failure (golangci-lint v1↔v2 schema mismatch on the
    # action) tracked as post-v0.2.0 follow-up in the soak matrix. Until
    # that's resolved, we still need Build/Docker artifacts to fire on
    # green unit tests, otherwise the orch's release pipeline is dark.
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ github.ref_name }} \
            --build-arg COMMIT=${GITHUB_SHA::7} \
            -t sophia-orchestator:${GITHUB_SHA::7} .
      - name: Image size
        run: docker image ls sophia-orchestator:${GITHUB_SHA::7}

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./... || true   # warnings; do not fail CI in V1
