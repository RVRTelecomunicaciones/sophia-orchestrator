name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write   # required by golangci-lint-action@v8+ for inline annotations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: golangci-lint
        # action @v8 is the first stable line that supports golangci-lint v2.
        # version is PINNED — v2.12.x embeds its own JSON schema (PR #6533),
        # so the action must run the exact same binary that generated the
        # config (v2.12.2 today). Renovate/Dependabot bumps both.
        # Note: install-mode goinstall is intentionally NOT set. Since
        # golangci-lint v2.1+ (PR #5695) the prebuilt binary correctly
        # honors `run.go` for module evaluation regardless of which Go
        # version the binary itself was built with.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: go test
        run: go test ./internal/... -race -count=1 -coverprofile=coverage.out
      - name: Coverage report
        run: go tool cover -func=coverage.out | tee coverage.txt | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: Run integration tests
        run: go test -tags=integration ./test/integration/... ./internal/adapters/outbound/pg/... -count=1 -timeout=10m

  contract:
    name: Contract lock (cross-repo workspace)
    runs-on: ubuntu-latest
    # Dedicated workspace-aware job for the cross-repo contract-lock e2e test
    # (test/integration/governance_contract_lock_test.go, build tag `contract`).
    # It is SEPARATE from the `integration` job on purpose: that job checks out
    # only orch, with no go.work and no govcore sibling, so it cannot resolve
    # the github.com/russellcxl/agent-governance-core/govhttptest seam import.
    # This job checks out BOTH repos side-by-side and generates a go.work that
    # links them, then runs only the `contract`-tagged test.
    #
    # MERGE-ORDER DEPENDENCY: this job checks out govcore `main`, where the
    # public `govhttptest` seam only exists AFTER the govcore seam PR (#10)
    # merges. Until #10 lands on govcore main, this job CANNOT resolve the seam
    # and will fail. Therefore PR-A must merge AFTER the govcore seam (#10) is
    # on govcore main.
    steps:
      # orch into a named sibling dir so the generated go.work can `use` both
      # checkouts with stable relative paths (mirrors the local /2026/go.work
      # layout where orch and govcore are siblings).
      - name: Checkout orch
        uses: actions/checkout@v4
        with:
          path: sophia-orchestator
      # govcore is a separate (private) repo: cross-repo checkout needs a token
      # with read access to RVRTelecomunicaciones/agent-governance-core.
      # ECOSYSTEM_REPO_TOKEN is a placeholder secret that MUST be configured in
      # the orch repo settings with govcore read scope before this job is green.
      - name: Checkout govcore (provides the govhttptest seam)
        uses: actions/checkout@v4
        with:
          repository: RVRTelecomunicaciones/agent-governance-core
          ref: main
          token: ${{ secrets.ECOSYSTEM_REPO_TOKEN }}
          path: agent-governance-core
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
          cache-dependency-path: sophia-orchestator/go.sum
      # Link both checkouts into one workspace so the seam import resolves
      # without a go.mod require (govcore has no public remote — a require would
      # force a failing VCS lookup). This mirrors the local /2026/go.work.
      - name: Generate cross-repo go.work
        run: go work init ./sophia-orchestator ./agent-governance-core
      - name: Run contract-lock test
        working-directory: sophia-orchestator
        run: go test -tags=contract -race -count=1 -timeout=10m ./test/integration/...

  build:
    name: Build binary
    runs-on: ubuntu-latest
    # NB: 'lint' intentionally NOT in needs[] — the lint job has a
    # pre-existing failure (golangci-lint v1↔v2 schema mismatch on the
    # action) tracked as post-v0.2.0 follow-up in the soak matrix. Until
    # that's resolved, we still need Build/Docker artifacts to fire on
    # green unit tests, otherwise the orch's release pipeline is dark.
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
      - name: go build
        run: |
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.commit=${GITHUB_SHA::7}" \
            -o bin/sophia-orchestator ./cmd/sophia-orchestator
      - uses: actions/upload-artifact@v4
        with:
          name: sophia-orchestator-${{ github.sha }}
          path: bin/sophia-orchestator

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    # NB: 'lint' intentionally NOT in needs[] — the lint job has a
    # pre-existing failure (golangci-lint v1↔v2 schema mismatch on the
    # action) tracked as post-v0.2.0 follow-up in the soak matrix. Until
    # that's resolved, we still need Build/Docker artifacts to fire on
    # green unit tests, otherwise the orch's release pipeline is dark.
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ github.ref_name }} \
            --build-arg COMMIT=${GITHUB_SHA::7} \
            -t sophia-orchestator:${GITHUB_SHA::7} .
      - name: Image size
        run: docker image ls sophia-orchestator:${GITHUB_SHA::7}

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./... || true   # warnings; do not fail CI in V1
