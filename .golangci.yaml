version: "2"
run:
  go: "1.26"
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - forbidigo
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unparam
    - unused
    - wrapcheck
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    forbidigo:
      forbid:
        - pattern: ^time\.Now$
          msg: use shared.Clock in domain/application
        - pattern: ^ulid\.Make$
          msg: use shared.IDGenerator in domain/application
    gosec:
      excludes:
        - G104
        - G115
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Join(
        - errors.Unwrap(
        - .Err()
        - .Scan(
        - .Exec(
        - context.Context).Err(
        - github.com/RVRTelecomunicaciones/sophia-orchestrator/
        - app.Run(
        - trace.Parse(
        - trace.New(
        - trace.FromRequestID(
        - envelope.Parse(
        - stdouttrace.New(
        - apply.NewTask(
        - .Execute(
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - forbidigo
          - gosec
          - wrapcheck
        path: _test\.go
      - linters:
          - revive
        path: _test\.go
        text: unused-parameter
      - linters:
          - unparam
        path: _test\.go
      - linters:
          - forbidigo
        path: internal/infrastructure
      - linters:
          - forbidigo
        path: internal/bootstrap
      - linters:
          - forbidigo
        path: internal/adapters
      - linters:
          - revive
        path: internal/domain/phase
        text: 'exported: type name will be used as phase\.'
      - linters:
          - revive
        path: internal/adapters/outbound/http_base
        text: 'var-naming: don''t use an underscore in package name'
      - linters:
          - govet
        path: internal/adapters/inbound/http/router_test\.go
        text: httpresponse
      - linters:
          - unused
        path: internal/application/phase/metrics\.go
      - linters:
          - unused
        path: internal/adapters/inbound/http/errors\.go
      - linters:
          - unused
        path: internal/adapters/inbound/http/handlers/util\.go
      - linters:
          - unused
        path: internal/adapters/outbound/http_base/client\.go
      - linters:
          - unparam
        path: internal/application/phase/service\.go
        text: appendAudit
      - linters:
          - unparam
        path: internal/application/apply/run\.go
        text: runAllGroups
      - linters:
          - forbidigo
        path: ops/local/stubs
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
