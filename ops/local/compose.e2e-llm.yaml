# Overlay para correr cycles SDD reales (con LLM dispatch) sobre el
# stack completo de compose.full-stack.yaml.
#
# El compose.full-stack.yaml por defecto usa el target `runtime-adapters`
# (distroless/static, ~30 MB, SIN opencode) — suficiente para tests
# unitarios + capability tests, pero NO para dispatch real al LLM.
# Este overlay reemplaza ese target por `runtime-adapters-llm-opencode`
# y monta el auth.json del operador como secret read-only.
#
# Uso:
#   docker compose \
#     -f compose.full-stack.yaml \
#     -f compose.e2e-llm.yaml \
#     up -d --build
#
# Pre-requisitos del HOST:
#   - opencode CLI autenticado en al menos un proveedor (ver
#     `opencode auth list`). El path estándar es:
#       ~/.local/share/opencode/auth.json
#     Si no existe, esta overlay falla con "no such file or directory"
#     al levantar runtime-adapters.
#   - Las imagenes runtime-adapters-llm-opencode se construyen on-the-fly
#     desde el repo sibling sophia-runtime-adapters. El primer up tarda
#     ~3 min adicionales (descarga opencode 1.14.48 dentro del build).
#
# Para probar OLLAMA o AIDER en lugar de opencode, hay overlays
# análogos en ROADMAP — por ahora este overlay solo cubre opencode
# (que es el provider default y el que está validado E2E).

services:
  runtime-adapters:
    build:
      # Reemplaza target distroless por LLM-capable.
      # opencode 1.14.48 + git + tini + nonroot user.
      target: runtime-adapters-llm-opencode
    environment:
      # Ampliar el path de comandos para incluir /usr/local/bin donde
      # vive opencode (el target llm-opencode lo instala ahí).
      RUNTIME_ALLOWED_COMMANDS_PATH: "/usr/local/bin:/usr/bin:/bin"
      # opencode trata de renderizar TUI por default — bloquea el
      # subprocess sin TTY. Mandatory en cualquier ENTRYPOINT
      # headless. Ver llm-providers.md pitfall #4.
      OPENCODE_DISABLE_TUI: "1"
      # Workspace mount: the LLM needs to read the actual project
      # source code to give meaningful answers. The host's
      # ~/Documents/2026 (parent of the 5 Sophia repos) is mounted
      # at /workspace inside the container, and the runtime's
      # allow-lists are expanded to permit read/exec operations
      # rooted at that path. Without this, the LLM only sees the
      # opencode SDK types + session logs and produces vague
      # answers (validated 2026-05-16: "sophia-dev Go source code
      # is not present in this environment").
      RUNTIME_ALLOWED_WORKING_DIRS: "/tmp:/workspace"
      RUNTIME_ALLOWED_FILESYSTEM_ROOTS: "/tmp:/workspace"
      # API keys forwarded to the opencode subprocess as a FALLBACK
      # when the OAuth in auth.json doesn't cover the requested model
      # (e.g. an opencode model that needs a paid OpenAI API tier).
      # Defaults to empty so OAuth is preferred — set the env vars on
      # the host shell BEFORE `up -d` to force the paid path:
      #
      #   export OPENAI_API_KEY="sk-..."          # only if needed
      #
      # 2026-05-18: matriz operacional NO usa Claude por decisión del
      # operator (sin Anthropic credentials, sin claude/* en routing).
      # OPENAI + GOOGLE quedan como doble opción.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    volumes:
      # Bind-mount las credenciales OAuth del operador como secret
      # read-only. El path en el container es el que opencode busca
      # por default ($HOME/.local/share/opencode/auth.json donde
      # $HOME=/home/nonroot porque el container corre como uid 65532).
      - "${HOME}/.local/share/opencode/auth.json:/home/nonroot/.local/share/opencode/auth.json:ro"
      # Config opencode con plugins opencode-claude-auth y
      # opencode-gemini-auth (sibling repo runtime-adapters mantiene
      # el archivo). SIN este mount el container opencode v1.14.48
      # arranca con catalog vacío para anthropic/* y google/* —
      # solo github-copilot/* + openai/*. Con los plugins instalados
      # se expanden los providers para usar las OAuth de Anthropic
      # y Google que el operator tiene en auth.json.
      - "${HOME}/Documents/2026/sophia-runtime-adapters/ops/local/opencode-config.json:/home/nonroot/.config/opencode/opencode.json:ro"
      # Claude Code credentials para el plugin opencode-claude-auth.
      # Path expected by the plugin per its installation.md:
      #   ~/.claude/.credentials.json   (note: leading dot in filename)
      # En macOS el plugin lee del Keychain "Claude Code-credentials".
      # En Linux containers cae al archivo. Extraer del Keychain:
      #   mkdir -p ~/.claude && chmod 700 ~/.claude
      #   security find-generic-password -s "Claude Code-credentials" -w \
      #     > ~/.claude/.credentials.json
      #   chmod 600 ~/.claude/.credentials.json
      - "${HOME}/.claude/.credentials.json:/home/nonroot/.claude/.credentials.json:ro"
      # Mount the host's Sophia workspace read-only. The runtime's
      # allow-lists above gate which paths shell.exec subprocesses
      # (opencode, git status, etc.) can actually touch. Read-only
      # so a buggy phase cannot rewrite the operator's source from
      # under them — for write paths (apply phase edits), the orch
      # creates an isolated worktree separately.
      - "${HOME}/Documents/2026:/workspace:ro"

  orchestator:
    environment:
      # SOPHIA_DISPATCHER_MODEL es REQUERIDO para opencode subprocess.
      # Sin -m flag, opencode no tiene default y sale silencioso con
      # stdout vacío (exit 0), lo cual el orch interpreta como
      # "envelope validation: invalid json: unexpected end of JSON input"
      # y la phase queda blocked.
      #
      # Operator decision 2026-05-18: matriz SIN Claude. Provider mix
      # de GPT-5.x + Gemini. NO se usa anthropic/* directo ni
      # github-copilot/claude-* — Claude queda fuera por decisión
      # operacional de simplicidad de credentials.
      #
      # BUG-22 (2026-05-27): gpt-5.4 se rutea por GitHub Copilot OAuth,
      # NO por ChatGPT Plus OAuth (`openai/gpt-5.4`). Razón: el token
      # OAuth de ChatGPT Plus no carga el scope `api.responses.write`
      # que requiere el endpoint /v1/responses al que opencode dispatcha
      # gpt-5.4 — el backend devuelve 401 silencioso y opencode emite
      # solo `step_start` + EOF, lo que el orch interpreta como envelope
      # inválida y bloquea con retries hasta IL5. Mismo modelo, otra
      # ruta OAuth (Copilot) = sin el bug. Validado E2E 27-05: 4/4
      # phases pre-apply attempts=1, confidence>=0.74, sin retries.
      # Investigación completa en engram topic_key
      # `sophia/bugs/bug-22-gpt-5-4-empty-stdout-research`.
      SOPHIA_DISPATCHER_MODEL: "github-copilot/gpt-5.4"

      # Per-phase routing matrix — stable hybrid validated 2026-05-27
      # via Copilot OAuth (gpt-5.4) + Google OAuth (gemini). Claude
      # direct via `anthropic/*` is intentionally NOT used inside the
      # Docker container because `opencode-claude-auth` cannot refresh
      # tokens without the macOS Keychain. The MCP Host Bridge cycle
      # reintroduces Claude via a host-side MCP server WITH Keychain
      # access — but operator policy keeps the in-container matrix
      # Claude-free for credential-isolation reasons.
      SOPHIA_DISPATCHER_MODEL_EXPLORE:  "google/gemini-3-flash-preview"
      SOPHIA_DISPATCHER_MODEL_PROPOSAL: "github-copilot/gpt-5.4"
      SOPHIA_DISPATCHER_MODEL_SPEC:     "github-copilot/gpt-5.4"
      SOPHIA_DISPATCHER_MODEL_DESIGN:   "github-copilot/gpt-5.4"
      SOPHIA_DISPATCHER_MODEL_TASKS:    "github-copilot/gpt-5.4"
      SOPHIA_DISPATCHER_MODEL_APPLY:    "github-copilot/gpt-5.4"
      SOPHIA_DISPATCHER_MODEL_VERIFY:   "github-copilot/gpt-5.4"
      SOPHIA_DISPATCHER_MODEL_ARCHIVE:  "google/gemini-3-flash-preview"

      # Tenant binding for memory-engine ingest path. The dev API key
      # seeded by sophia-memory-engine/migrations/postgres/003_create_
      # api_keys.up.sql is bound to (project_id="sophia-dev",
      # tenant_id="sophia-dev"). The orch must stamp the same tenant
      # on MemoryScope when persisting artifacts or memory-engine
      # returns HTTP 403 forbidden (cross-tenant write).
      SOPHIA_MEMORY_TENANT_ID: "sophia-dev"

